<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="demo" style="color:blue"></p>

    <script>
        size = 15

        function add() {
            demo.style.fontSize = size + "px"
            demo.style.color = "orange"
            demo.innerHTML = "hello"
            
            if(size <= 50) {
                size++
            }
        }
        
        setInterval(add, 100)
    </script>
</body>
</html>
